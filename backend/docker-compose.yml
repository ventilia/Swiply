services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-swiply}
      POSTGRES_USER: ${POSTGRES_USER:-swiply}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swiply-secret}
    volumes:
      - swiply-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-swiply} -d ${POSTGRES_DB:-swiply}"]
      interval: 5s
      timeout: 3s
      retries: 10

  mongodb:
    image: mongo:7
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-swiply}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-swiply-secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-swiply}
    volumes:
      - swiply-mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.adminCommand({ping: 1})'"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    volumes:
      - swiply-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-swiply}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-swiply-secret}
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT:-15673}:15672"
    volumes:
      - swiply-rabbit-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-swiply}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-swiply-secret}
    ports:

      - "${MINIO_PORT:-9100}:9000"
      - "${MINIO_CONSOLE_PORT:-9101}:9001"
    volumes:
      - swiply-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: .
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_DB: ${POSTGRES_DB:-swiply}
      POSTGRES_USER: ${POSTGRES_USER:-swiply}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-swiply-secret}
      MONGO_USER: ${MONGO_USER:-swiply}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-swiply-secret}
      MONGO_DB: ${MONGO_DB:-swiply}
      RABBITMQ_USER: ${RABBITMQ_USER:-swiply}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-swiply-secret}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-swiply}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-swiply-secret}
      MEDIA_PUBLIC_ENDPOINT: ${MEDIA_PUBLIC_ENDPOINT:-http://10.0.2.2:9100}
      JWT_SECRET: ${JWT_SECRET:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@swiply.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin12345}
      SWIPLY_SEED_ENABLED: ${SWIPLY_SEED_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  swiply-pg-data:
  swiply-mongo-data:
  swiply-redis-data:
  swiply-rabbit-data:
  swiply-minio-data:
