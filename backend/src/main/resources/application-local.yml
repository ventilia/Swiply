spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5433}/${POSTGRES_DB:swiply}
    username: ${POSTGRES_USER:swiply}
    password: ${POSTGRES_PASSWORD:swiply-secret}
  data:
    mongodb:
      uri: mongodb://${MONGO_USER:swiply}:${MONGO_PASSWORD:swiply-secret}@localhost:${MONGO_PORT:27018}/${MONGO_DB:swiply}?authSource=admin
    redis:
      host: localhost
      port: ${REDIS_PORT:6380}
  rabbitmq:
    host: localhost
    port: ${RABBITMQ_PORT:5673}
    username: ${RABBITMQ_USER:swiply}
    password: ${RABBITMQ_PASSWORD:swiply-secret}

swiply:
  media:
    endpoint: http://localhost:${MINIO_PORT:9100}
  auth:
    log-email-tokens: true

logging:
  level:
    com.swiply.backend: DEBUG
