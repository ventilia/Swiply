<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head th:replace="~{admin/layout :: head('Репорты')}"></head>
<body>
<nav th:replace="~{admin/layout :: nav(${active})}"></nav>
<div class="container">
    <h1>Репорты</h1>

    <div class="filters">
        <a class="btn" th:classappend="${status == 'PENDING'} ? 'primary' : 'ghost'" th:href="@{/admin/reports(status='PENDING')}">В очереди</a>
        <a class="btn" th:classappend="${status == 'ACTIONED'} ? 'primary' : 'ghost'" th:href="@{/admin/reports(status='ACTIONED')}">Принят</a>
        <a class="btn" th:classappend="${status == 'DISMISSED'} ? 'primary' : 'ghost'" th:href="@{/admin/reports(status='DISMISSED')}">Отклонён</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>Дата</th><th>Кто</th><th>На кого</th><th>Причина</th><th>Описание</th><th>Статус</th><th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${reports}">
            <td class="muted" th:text="${#strings.substring(r.createdAt.toString(), 0, 16)}">2026-01-01</td>
            <td th:text="${r.reporterEmail ?: r.reporterId}">a@b.c</td>
            <td>
                <span th:text="${r.targetDisplayName ?: '—'}">Имя</span>
                <span class="muted" th:text="'(' + ${r.targetEmail ?: r.targetUserId} + ')'">(email)</span>
            </td>
            <td><span class="pill PENDING" th:text="${r.reason}">SPAM</span></td>
            <td class="muted" th:text="${r.description ?: '—'}">—</td>
            <td><span class="pill" th:classappend="${r.status.name}" th:text="${r.status}">PENDING</span></td>
            <td>
                <div class="row-actions" th:if="${r.status.name == 'PENDING'}">
                    <form th:action="@{'/admin/reports/' + ${r.id} + '/resolve'}" method="post">
                        <input type="hidden" name="dismiss" value="false">
                        <input type="hidden" name="banTarget" value="true">
                        <input type="hidden" name="targetUserId" th:value="${r.targetUserId}">
                        <button class="btn danger" type="submit">Бан + закрыть</button>
                    </form>
                    <form th:action="@{'/admin/reports/' + ${r.id} + '/resolve'}" method="post">
                        <input type="hidden" name="dismiss" value="false">
                        <button class="btn" type="submit">Принять</button>
                    </form>
                    <form th:action="@{'/admin/reports/' + ${r.id} + '/resolve'}" method="post">
                        <input type="hidden" name="dismiss" value="true">
                        <button class="btn ghost" type="submit">Отклонить</button>
                    </form>
                </div>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(reports)}">
            <td colspan="7" class="empty">Очередь пуста 🎉</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
